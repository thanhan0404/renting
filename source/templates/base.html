<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tintus.digicam — Thuê Máy Ảnh Chuyên Nghiệp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,800&display=swap" rel="stylesheet">
    <style>
        /* ── Global reset & design tokens ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a0a;
            --surface:   #141414;
            --card:      #1a1a1a;
            --border:    #2a2a2a;
            --text:      #ffffff;
            --muted:     #888888;
            --red:       #e63946;
            --red-dark:  #c1121f;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Sticky navigation ── */
        nav {
            position: sticky;
            top: 0;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6%;
            height: 68px;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }

        /* Logo */
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
        }

        .nav-logo-badge {
            width: 38px;
            height: 38px;
            background: var(--red);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .nav-logo-name {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .nav-logo-sub {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Right side */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 36px;
        }

        .nav-phone {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-phone:hover { color: var(--text); }

        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--muted);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active { color: var(--text); }

        /* ── Shared utility classes used across pages ── */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: #ffffff;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-primary:hover {
            background: #e8e8e8;
            transform: translateY(-1px);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: transparent;
            color: #ffffff;
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            text-decoration: none;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
        }

        .btn-secondary:hover {
            border-color: rgba(255,255,255,0.75);
            background: rgba(255,255,255,0.06);
            transform: translateY(-1px);
        }

        .red { color: var(--red); }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">
            <div class="nav-logo-badge">📷</div>
            <div>
                <div class="nav-logo-name">tintus.digicam</div>
                <div class="nav-logo-sub">Rental Studio</div>
            </div>
        </a>

        <div class="nav-right">
            <a href="tel:0345765217" class="nav-phone">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.21 11.9 19.79 19.79 0 0 1 1.14 3.3 2 2 0 0 1 3.11 1.1h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
                0345 765 217
            </a>
            <ul class="nav-links">
                <li><a href="/" {% if request.path == '/' %}class="active"{% endif %}>Trang chủ</a></li>
                <li><a href="/rent" {% if request.path == '/rent' %}class="active"{% endif %}>Thuê máy</a></li>
            </ul>
        </div>
    </nav>

    <main>{% block content %}{% endblock %}</main>
</body>
</html>
