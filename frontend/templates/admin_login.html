<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Đăng nhập quản trị</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style> * { font-family:'Inter',system-ui,sans-serif; } </style>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-6">
      <div class="w-14 h-14 bg-red-700 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-red-700/25">📷</div>
      <h1 class="mt-3 text-lg font-black text-gray-900">tintus.digicam</h1>
      <p class="text-xs font-bold uppercase tracking-widest text-gray-400">Khu vực quản trị</p>
    </div>

    <form method="POST" class="bg-white border border-gray-200 rounded-2xl shadow-sm p-6 space-y-4">
      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm font-semibold rounded-xl px-4 py-2.5">{{ error }}</div>
      {% endif %}
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Tài khoản</label>
        <input name="username" type="text" autocomplete="username" autofocus required
               class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-100">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Mật khẩu</label>
        <input name="password" type="password" autocomplete="current-password" required
               class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-100">
      </div>
      <button type="submit"
              class="w-full bg-red-700 hover:bg-red-800 text-white font-bold text-sm py-2.5 rounded-xl transition-colors">Đăng nhập</button>
    </form>

    <p class="text-center text-[11px] text-gray-400 mt-4">Chỉ dành cho nhân viên cửa hàng.</p>
  </div>
</body>
</html>
