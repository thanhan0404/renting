{% extends 'admin/tintus_base.html' %}

{% block admin_content %}
<div class="flex flex-wrap items-center justify-between gap-3 mb-4">
  <div>
    <h1 class="text-xl font-black text-gray-900">Sổ tay</h1>
    <p class="text-sm text-gray-500">Bảng tính tự do · tự động lưu sau khi gõ</p>
  </div>
</div>

<div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
  <!-- Toolbar -->
  <div class="flex flex-wrap items-center gap-2 px-4 py-3 border-b border-gray-200 bg-gray-50/60">
    <div class="flex items-center gap-2">
      <span class="text-xs font-bold text-gray-500 uppercase tracking-wide">Tên sổ</span>
      <input id="sheetName" type="text" placeholder="Sổ tay"
             class="border border-gray-200 rounded-xl px-3 py-2 text-sm font-bold text-gray-800 bg-white focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 min-w-[200px]">
    </div>

    <div class="h-6 w-px bg-gray-200 mx-1 hidden sm:block"></div>

    <button id="addRowBtn" class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 text-sm font-bold px-3.5 py-2 rounded-xl">+ Hàng</button>
    <button id="addColBtn" class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 text-sm font-bold px-3.5 py-2 rounded-xl">+ Cột</button>

    <div class="ml-auto flex items-center gap-3">
      <span id="savedStatus" class="text-xs font-semibold text-gray-400 whitespace-nowrap">—</span>
      <button id="saveBtn" class="bg-brand-700 hover:bg-brand-800 text-white text-sm font-bold px-4 py-2 rounded-xl">Lưu</button>
    </div>
  </div>

  <!-- Grid -->
  <div id="gridWrap" class="overflow-auto" style="max-height:calc(100vh - 260px)">
    <table id="sheetTable" class="sheet-table"></table>
  </div>
</div>

<p class="text-xs text-gray-400 mt-3">
  Mẹo: Enter để xuống dòng · Tab để sang phải · bảng tự lưu sau khoảng 0,8 giây khi bạn ngừng gõ.
</p>

<style>
  #sheetTable { border-collapse:separate; border-spacing:0; table-layout:fixed; }
  #sheetTable th, #sheetTable td { border-right:1px solid #e5e7eb; border-bottom:1px solid #e5e7eb; padding:0; }

  /* Column letter header */
  #sheetTable thead th {
    position:sticky; top:0; z-index:6; background:#f9fafb;
    height:30px; font-size:11px; font-weight:800; color:#6b7280;
    text-transform:uppercase; letter-spacing:.05em; text-align:center;
    min-width:90px; width:90px; border-top:1px solid #e5e7eb;
  }
  /* Row-number cells */
  #sheetTable tbody th, #sheetTable thead th.corner {
    position:sticky; left:0; z-index:5; background:#f9fafb;
    width:46px; min-width:46px; max-width:46px;
    font-size:11px; font-weight:800; color:#9ca3af; text-align:center; vertical-align:middle;
    border-left:1px solid #e5e7eb;
  }
  #sheetTable thead th.corner { z-index:7; top:0; }

  /* Body cells */
  #sheetTable tbody td { background:#fff; }
  #sheetTable input.cell {
    display:block; width:100%; height:30px; min-width:90px;
    border:0; outline:0; background:transparent;
    padding:0 7px; font-size:13px; color:#1f2937;
    font-family:'Inter','SFMono-Regular',ui-monospace,monospace;
  }
  #sheetTable input.cell:focus {
    box-shadow:inset 0 0 0 2px #b91c1c; border-radius:2px;
    background:#fff;
  }
  /* Header highlight for the active cell's row/col */
  #sheetTable thead th.hl, #sheetTable tbody th.hl {
    background:#fee2e2; color:#b91c1c;
  }
</style>
{% endblock %}

{% block admin_js %}
<script>
// ── State ───────────────────────────────────────────────────────────────
const SHEET = {
  name: 'Sổ tay',
  data: [],            // 2D array of strings (the source of truth)
  dirty: false,
  saving: false,
  timer: null,
};
const DEBOUNCE_MS = 800;

const tableEl  = document.getElementById('sheetTable');
const nameEl   = document.getElementById('sheetName');
const statusEl = document.getElementById('savedStatus');

// ── Helpers ─────────────────────────────────────────────────────────────
// Spreadsheet column label: 0->A, 25->Z, 26->AA, ...
function colLabel(i){
  let s = '';
  i += 1;
  while(i > 0){
    const r = (i - 1) % 26;
    s = String.fromCharCode(65 + r) + s;
    i = Math.floor((i - 1) / 26);
  }
  return s;
}

function hhmm(iso){
  if(!iso) return '';
  const d = new Date(iso);
  if(isNaN(d)) return '';
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function setSavedStatus(iso){
  const t = hhmm(iso);
  statusEl.textContent = t ? ('Đã lưu lúc ' + t) : 'Đã lưu';
  statusEl.classList.remove('text-amber-600');
  statusEl.classList.add('text-gray-400');
}
function setSavingStatus(){
  statusEl.textContent = 'Đang lưu…';
  statusEl.classList.remove('text-gray-400');
  statusEl.classList.add('text-amber-600');
}

// Read the in-memory model straight from the inputs to guarantee freshness.
function collectData(){
  const out = [];
  const bodyRows = tableEl.tBodies[0] ? tableEl.tBodies[0].rows : [];
  for(let r=0; r<bodyRows.length; r++){
    const inputs = bodyRows[r].querySelectorAll('input.cell');
    const row = [];
    for(let c=0; c<inputs.length; c++) row.push(inputs[c].value);
    out.push(row);
  }
  return out;
}

// ── Render ──────────────────────────────────────────────────────────────
function render(){
  const data = SHEET.data;
  const nRows = data.length;
  const nCols = data.reduce((m, row) => Math.max(m, row.length), 0) || 1;

  // Normalise ragged rows so every row has nCols entries.
  for(let r=0; r<nRows; r++){
    const row = data[r];
    while(row.length < nCols) row.push('');
  }

  // Head
  let head = '<thead><tr><th class="corner"></th>';
  for(let c=0; c<nCols; c++) head += `<th data-col="${c}">${colLabel(c)}</th>`;
  head += '</tr></thead>';

  // Body
  let body = '<tbody>';
  for(let r=0; r<nRows; r++){
    body += `<tr><th data-row="${r}">${r+1}</th>`;
    for(let c=0; c<nCols; c++){
      const v = data[r][c] == null ? '' : String(data[r][c]);
      const esc = v.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      body += `<td><input class="cell" data-row="${r}" data-col="${c}" value="${esc}"></td>`;
    }
    body += '</tr>';
  }
  body += '</tbody>';

  tableEl.innerHTML = head + body;
}

// ── Header highlight on focus ───────────────────────────────────────────
function clearHighlight(){
  tableEl.querySelectorAll('th.hl').forEach(el => el.classList.remove('hl'));
}
function highlight(r, c){
  clearHighlight();
  const colHead = tableEl.querySelector(`thead th[data-col="${c}"]`);
  const rowHead = tableEl.querySelector(`tbody th[data-row="${r}"]`);
  if(colHead) colHead.classList.add('hl');
  if(rowHead) rowHead.classList.add('hl');
}

// ── Editing / dirty / autosave ──────────────────────────────────────────
function markDirty(){
  SHEET.dirty = true;
  if(SHEET.timer) clearTimeout(SHEET.timer);
  SHEET.timer = setTimeout(() => autosave(), DEBOUNCE_MS);
}

async function persist(announce){
  if(SHEET.timer){ clearTimeout(SHEET.timer); SHEET.timer = null; }
  if(SHEET.saving) return;
  SHEET.saving = true;
  setSavingStatus();
  const payload = { name: nameEl.value.trim() || 'Sổ tay', data: collectData() };
  try {
    const res = await TINTUS.api(`{{ url_for('sheet.save') }}`, payload);
    SHEET.dirty = false;
    SHEET.name = payload.name;
    setSavedStatus(res && res.updated_at);
    if(announce) TINTUS.toast('Đã lưu', 'ok');
  } catch(e){
    statusEl.textContent = 'Lưu lỗi';
    statusEl.classList.remove('text-gray-400'); statusEl.classList.add('text-amber-600');
    TINTUS.toast(e.message || 'Lưu thất bại', 'err');
  } finally {
    SHEET.saving = false;
  }
}

// Autosave is quiet (status text only); explicit Lưu announces via toast.
function autosave(){ persist(false); }

// ── Keyboard navigation ─────────────────────────────────────────────────
function cellAt(r, c){
  return tableEl.querySelector(`input.cell[data-row="${r}"][data-col="${c}"]`);
}
function onCellKeydown(e){
  const inp = e.target;
  const r = parseInt(inp.dataset.row, 10);
  const c = parseInt(inp.dataset.col, 10);
  let target = null;
  if(e.key === 'Enter'){
    e.preventDefault();
    target = cellAt(r + 1, c);
    if(!target){ // append a row when stepping past the bottom
      addRow(false);
      target = cellAt(r + 1, c);
    }
  } else if(e.key === 'ArrowDown'){
    target = cellAt(r + 1, c);
  } else if(e.key === 'ArrowUp'){
    target = cellAt(r - 1, c);
  } else if(e.key === 'ArrowRight' && inp.selectionStart === inp.value.length){
    target = cellAt(r, c + 1);
  } else if(e.key === 'ArrowLeft' && inp.selectionStart === 0){
    target = cellAt(r, c - 1);
  }
  // Tab keeps the browser default (natural left-to-right traversal).
  if(target){
    e.preventDefault();
    target.focus();
    target.select();
  }
}

// ── Delegated events on the table ───────────────────────────────────────
tableEl.addEventListener('input', e => {
  if(e.target.classList.contains('cell')) markDirty();
});
tableEl.addEventListener('focusin', e => {
  if(e.target.classList.contains('cell')){
    highlight(parseInt(e.target.dataset.row,10), parseInt(e.target.dataset.col,10));
  }
});
tableEl.addEventListener('focusout', e => {
  if(e.target.classList.contains('cell')) clearHighlight();
});
tableEl.addEventListener('keydown', e => {
  if(e.target.classList.contains('cell')) onCellKeydown(e);
});

// ── Add row / column ────────────────────────────────────────────────────
function addRow(save){
  SHEET.data = collectData();                      // capture current edits
  const nCols = SHEET.data.reduce((m,row)=>Math.max(m,row.length),0) || 8;
  SHEET.data.push(new Array(nCols).fill(''));
  render();
  if(save !== false) markDirty();
}
function addCol(){
  SHEET.data = collectData();
  if(SHEET.data.length === 0) SHEET.data.push([]);
  SHEET.data.forEach(row => row.push(''));
  render();
  markDirty();
}

// ── Wire up toolbar ─────────────────────────────────────────────────────
document.getElementById('addRowBtn').addEventListener('click', () => addRow(true));
document.getElementById('addColBtn').addEventListener('click', addCol);
document.getElementById('saveBtn').addEventListener('click', () => persist(true));
nameEl.addEventListener('input', markDirty);

// Save pending edits if the user navigates away mid-debounce.
window.addEventListener('beforeunload', () => {
  if(SHEET.dirty && !SHEET.saving){
    try {
      const payload = JSON.stringify({ name: nameEl.value.trim() || 'Sổ tay', data: collectData() });
      navigator.sendBeacon(`{{ url_for('sheet.save') }}`, new Blob([payload], {type:'application/json'}));
    } catch(e){}
  }
});

// ── Initial load ────────────────────────────────────────────────────────
async function init(){
  try {
    const res = await TINTUS.api(`{{ url_for('sheet.load') }}`);
    SHEET.name = (res && res.name) || 'Sổ tay';
    nameEl.value = SHEET.name;
    let data = (res && Array.isArray(res.data)) ? res.data : null;
    if(!data || data.length === 0 || data.every(r => !Array.isArray(r) || r.length === 0)){
      data = Array.from({length:30}, () => new Array(8).fill(''));  // empty -> 30x8
    }
    // Coerce every cell to a string.
    SHEET.data = data.map(row => (Array.isArray(row) ? row.map(c => c == null ? '' : String(c)) : []));
    render();
    setSavedStatus(res && res.updated_at);
  } catch(e){
    nameEl.value = SHEET.name;
    SHEET.data = Array.from({length:30}, () => new Array(8).fill(''));
    render();
    statusEl.textContent = 'Chưa tải được';
    TINTUS.toast(e.message || 'Không tải được sổ tay', 'err');
  }
}
init();
</script>
{% endblock %}
