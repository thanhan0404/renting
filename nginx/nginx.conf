# nginx/nginx.conf
events {
    worker_connections 1024;
}

http {
    # ── Hardening ────────────────────────────────────────────────────────────
    server_tokens off;            # don't leak the nginx version
    autoindex      off;           # never list directory contents (no dir listing)

    # Real client IP when running behind Cloudflare Tunnel / a trusted proxy.
    # Without this, IP rules below would only ever see the proxy's own address.
    # (Cloudflare sends the visitor IP in the CF-Connecting-IP header.)
    # real_ip_header CF-Connecting-IP;
    # set_real_ip_from 0.0.0.0/0;

    # Reusable proxy settings → Gunicorn container.
    upstream app_backend { server web:5000; }

    server {
        listen 80;
        server_name _;            # replaced by your real domain later

        # Security headers for every response.
        add_header X-Frame-Options        "SAMEORIGIN"        always;
        add_header X-Content-Type-Options "nosniff"           always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── ADMIN PANEL (secret path) ─────────────────────────────────────────
        # This MUST match ADMIN_URL_PREFIX in the Flask app (default below).
        # The app already requires a login here; the block below adds OPTIONAL
        # extra edge layers. Uncomment what you want.
        location /quan-tri-tintus/ {
            # 1) IP allow-list (network segregation). Only these may even reach
            #    the admin; everyone else gets 403. Requires the real_ip_* lines
            #    above if you sit behind Cloudflare. Add your office/Tailscale IPs.
            # allow 100.64.0.0/10;     # Tailscale range (example)
            # allow 203.0.113.5;       # your office IP (example)
            # deny  all;

            # 2) Extra HTTP Basic Auth at the edge (a 2nd password before the app
            #    login even renders). Create the file with:
            #      htpasswd -c /etc/nginx/.htpasswd youruser
            # auth_basic           "Restricted";
            # auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://app_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Public site ───────────────────────────────────────────────────────
        location / {
            proxy_pass http://app_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Optional: serve static files directly for performance.
        # location /static/ {
        #     alias /app/frontend/static/;
        #     autoindex off;
        # }
    }
}
