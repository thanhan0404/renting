services:
  web:
    build: .
    container_name: camerashop_web
    # REMOVED the 'ports' section here so it is not exposed directly
    volumes:
      - ./backend/instance:/app/backend/instance
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: camerashop_nginx
    #ports:
    #  - "80:80" # Optional: You can remove this line to force ALL traffic to go through Cloudflare. Leave it if you want to access the site via Tailscale IP directly.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  # --- ADD THIS NEW SECTION BELOW ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN} # This tells Docker to look for a secret
