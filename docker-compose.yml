services:
  web:
    build: .
    container_name: camerashop_web
    # REMOVED the 'ports' section here so it is not exposed directly
    volumes:
      - ./backend/instance:/app/backend/instance
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: camerashop_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped